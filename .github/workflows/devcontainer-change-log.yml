# devcontainer-change-log.yml
# Detects and logs devcontainer infrastructure changes as a structured step summary
name: "Devcontainer Change Log"

on:
  push:
    branches:
      - main
      - develop
    paths:
      - '.devcontainer/**'
      - '.github/workflows/copilot-setup-steps.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  log-changes:
    name: Log Infrastructure Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 2

      - name: Write infrastructure change summary
        if: always()
        env:
          GIT_SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- '.devcontainer/' '.github/workflows/copilot-setup-steps.yml' 2>/dev/null || true)

          {
            echo "## Devcontainer Infrastructure Changes"
            echo ""
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| Commit | \`${GIT_SHA}\` |"
            echo "| Branch | \`${REF_NAME}\` |"
            echo "| Trigger | \`${EVENT_NAME}\` |"
            echo ""

            if [ -z "$CHANGED" ]; then
              echo "_No devcontainer infrastructure files changed in this push._"
            else
              echo "| File | Category | Pre-build Impact |"
              echo "|------|----------|-----------------|"
              while IFS= read -r file; do
                [ -z "$file" ] && continue
                case "$file" in
                  .devcontainer/scripts/on-create.sh)
                    echo "| \`$file\` | Lifecycle Scripts | High |"
                    ;;
                  .devcontainer/scripts/post-create.sh)
                    echo "| \`$file\` | Lifecycle Scripts | Low |"
                    ;;
                  .devcontainer/devcontainer.json)
                    echo "| \`$file\` | Config | High |"
                    ;;
                  .github/workflows/copilot-setup-steps.yml)
                    echo "| \`$file\` | Setup Steps | Medium |"
                    ;;
                  .devcontainer/*)
                    echo "| \`$file\` | Config | Medium |"
                    ;;
                  *)
                    echo "| \`$file\` | Other | Unknown |"
                    ;;
                esac
              done <<< "$CHANGED"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
